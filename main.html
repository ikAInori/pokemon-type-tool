    <style>
        :root {
            --bg-color: #f0f2f5;
            --card-bg: #ffffff;
            --primary-blue: #2a75bb;
            --primary-blue-light: #eaf3ff;
            --text-main: #333;
            --text-sub: #666;
            --border-color: #e8ebf0;
            --shadow-main: 0 4px 15px rgba(0,0,0,0.08);
            --shadow-soft: 0 2px 10px rgba(0,0,0,0.05);
        }

        * { box-sizing: border-box; }
        body {
            font-family: "PingFang TC", "Microsoft JhengHei", sans-serif;
            background-color: var(--bg-color);
            margin: 20px;
            line-height: 1.6;
            color: var(--text-main);
        }
        h2 { color: #333; border-left: 5px solid var(--primary-blue); padding-left: 10px; margin: 0 0 14px; }
        h3 { margin: 0; }

						  
        .analysis-layout {
            --team1-width: 1fr;
            --team2-width: 1fr;
            display: grid;
            grid-template-columns: minmax(0, var(--team1-width)) 5px minmax(0, var(--team2-width));
            grid-template-areas: "team1 splitter team2";
            column-gap: 0;
            row-gap: 18px;
            margin-bottom: 30px;
            align-items: start;
        }

        .analysis-panel {
            background: var(--card-bg);
            border-radius: 14px;
            box-shadow: var(--shadow-main);
            border: 2px solid transparent;
            overflow: hidden;
            transition: border-color 0.2s ease, box-shadow 0.2s ease, transform 0.2s ease;
            cursor: pointer;
        }
        .analysis-panel:hover { border-color: #d7e8ff; }
        .analysis-panel.active { border-color: var(--primary-blue); box-shadow: 0 8px 24px rgba(42, 117, 187, 0.18); }
        .analysis-panel.team1 { grid-area: team1; }
        .analysis-panel.team2 { grid-area: team2; }
        .analysis-panel.list {
            grid-column: 1 / -1;
            margin-top: 16px;
        }
        
        .team-resizer {
            grid-area: splitter;
            align-self: stretch;
            position: relative;
            cursor: col-resize;
            background: #cfd6df;
            z-index: 5;
        }
        .team-resizer::before {
            content: "";
            position: absolute;
            left: 50%; top: 0; bottom: 0; width: 5px;
            transform: translateX(-50%);
            background: #cfd6df;
        }
        .team-resizer:hover::before, .team-resizer.dragging::before {
            background: #2a75bb;
            box-shadow: 0 0 0 2px rgba(42, 117, 187, 0.12);
        }

        .panel-header { display: flex; align-items: center; justify-content: space-between; padding: 10px 18px; background: #f7f9fc; border-bottom: 1px solid var(--border-color); }
        .analysis-panel.active .panel-header { background: var(--primary-blue-light); }
        .panel-body { min-height: 120px; padding: 10px 18px; }
        .panel-empty { padding: 26px 8px; text-align: center; color: #9aa3ad; border: 2px dashed #d9e1ea; border-radius: 12px; background: #fafbfd; }
        .analysis-panel.collapsed .panel-body {
            display: none;
            min-height: 0;
            padding-top: 0;
            padding-bottom: 0;
        }
        .analysis-panel.collapsed {
            overflow: hidden;
        }
        .panel-title-button {
            appearance: none;
            border: none;
            background: transparent;
            padding: 0;
            margin: 0;
            font: inherit;
            color: inherit;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }
        .panel-title-button::after {
            content: "▾";
            font-size: 14px;
            color: #7f8a96;
            transition: transform 0.18s ease;
        }
        .analysis-panel.collapsed .panel-title-button::after {
            transform: rotate(-90deg);
        }

        .selected-row {
            display: grid;
            grid-template-columns: 72px minmax(92px, max-content) minmax(0, 1fr) 32px;
            align-items: start;
            gap: 0px;
            padding: 4px 0;
        }
        .selected-row img { width: 58px; height: 58px; object-fit: contain; }
        .pokemon-name { font-size: 18px; font-weight: 700; }
		
		.pool-filter-toolbar {
            display: grid;			
		}
		
        /* 屬性篩選按鈕 CSS - 窄版置中 */
        .type-filter-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            justify-content: center;
            margin-bottom: 18px;
            max-width: 900px;
            margin-left: auto;
            margin-right: auto;
        }
        .type-filter-btn {
            width: 85px;
            border: none;
            border-radius: 10px;
            color: #fff;
            font-size: 12px;
            font-weight: 800;
            padding: 10px 0;
            cursor: pointer;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            transition: all 0.15s ease;
            text-align: center;
        }
        .type-filter-btn.active { outline: 3px solid #222; outline-offset: 1px; }

        .eff-group { display: flex; gap: 8px; flex-wrap: wrap; }
        /* 修改後的屬性倍率區塊樣式 */
		.eff-box { 
			display: flex; 
			flex-direction: column; 
			align-items: center; 
			padding: 5px 4px; 
			border-radius: 8px; 
			min-width: 70px; 
			border: 1px solid rgba(0,0,0,0.05); 
		}
		/* 依照您的需求設定背景色 */
		.eff-box.bg-4x { background-color: #fdeaea; }   /* 較深的淺紅 */
		.eff-box.bg-2x { background-color: #fef3f2; }   /* 淺紅 */
		.eff-box.bg-05x { background-color: #f5fbf5; }  /* 淺綠 */
		.eff-box.bg-025x { background-color: #edf8ed; } /* 較深的淺綠 */
		.eff-box.bg-0x { background-color: #f0f0f0; }   /* 灰色 */
        .eff-label { font-size: 11px; font-weight: 800; margin-bottom: 4px; }
        .eff-content { display: flex; gap: 2px; flex-wrap: wrap; justify-content: center; }

        .type-badge { padding: 3px 8px; border-radius: 20px; color: white; font-size: 11px; margin: 2px; display: inline-block; cursor: pointer; border: 2px solid transparent; transition: transform 0.15s ease, border-color 0.15s ease, box-shadow 0.15s ease; transform-origin: center center; }
        .type-badge.type-highlighted { transform: scale(1.1); border-color: #111; box-shadow: 0 0 0 1px rgba(0,0,0,0.08); }

        #pool-container { display: grid; grid-template-columns: repeat(auto-fill, minmax(85px, 1fr)); gap: 0px; background: #fff; padding: 20px; border-radius: 12px; box-shadow: var(--shadow-soft); }
        .pool-item { text-align: center; cursor: pointer; padding: 8px; border-radius: 10px; transition: 0.2s; border: 1px solid transparent; }
        .pool-item:hover { background: #eef6ff; transform: translateY(-3px); border-color: var(--primary-blue); }
        .pool-item img { width: 56px; height: 56px; }

        /* 顏色定義 */
        .type-normal { background: #A8A77A; } .type-fire { background: #EE8130; } .type-water { background: #6390F0; }
        .type-electric { background: #F7D02C; } .type-grass { background: #7AC74C; } .type-ice { background: #96D9D6; }
        .type-fighting { background: #C22E28; } .type-poison { background: #A33EA1; } .type-ground { background: #E2BF65; }
        .type-flying { background: #A98FF3; } .type-psychic { background: #F95587; } .type-bug { background: #A6B91A; }
        .type-rock { background: #B6A136; } .type-ghost { background: #735797; } .type-dragon { background: #6F35FC; }
        .type-steel { background: #B7B7CE; } .type-dark { background: #705746; } .type-fairy { background: #D685AD; }

        .btn-panel-action { padding: 6px 12px; border-radius: 8px; border: 1px solid #ddd; cursor: pointer; font-size: 12px; background: #fff; }
        .btn-panel-action.btn-danger:hover { background: #fff1f0; color: #ff4d4f; border-color: #ff4d4f; }
        .btn-filter-action { padding: 10px 20px; border-radius: 20px; border: none; background: #7d7d7d; color: #fff; cursor: pointer; margin: 0 5px; }
        .filter-controls-row {
            text-align: center;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
            flex-wrap: wrap;
        }
        .batch-add-input {
            width: 78px;
            padding: 9px 10px;
            border-radius: 12px;
            border: 1px solid #cfd6df;
            font-size: 14px;
            text-align: center;
            background: #fff;
        }
    </style>
</head>

        <div class="team-resizer" id="team-resizer"></div>

            <div class="panel-body" id="team2-container"></div>
        </div>
    </div>

    <div class="analysis-panel list" data-target="list" onclick="setActiveTarget('list')">

        <div class="panel-body" id="list-container"></div>
    </div>


    <div class="pool-filter-toolbar">
        <div class="type-filter-grid" id="type-filter-container"></div>
        <div class="filter-controls-row">
            <button class="btn-filter-action" onclick="clearHighlightedTypes()">清除高光</button>
            <button class="btn-filter-action" onclick="resetTypeFilters()">重置篩選</button>
            <input id="batch-add-count" class="batch-add-input" type="number" min="1" value="50">
            <button class="btn-filter-action" onclick="addSequentialToList()">依序新增X隻寶可夢到列表</button>
        </div>
    </div>

    <div id="pool-container"></div>

const typeMap = {"一般": "normal", "火": "fire", "水": "water", "草": "grass", "電": "electric", "冰": "ice", "格鬥": "fighting", "毒": "poison", "地面": "ground", "飛行": "flying", "超能力": "psychic", "蟲": "bug", "岩石": "rock", "幽靈": "ghost", "龍": "dragon", "鋼": "steel", "惡": "dark", "妖精": "fairy"};
const chart = {
    normal: { rock: 0.5, ghost: 0, steel: 0.5 },
    fire: { fire: 0.5, water: 0.5, grass: 2, ice: 2, bug: 2, rock: 0.5, dragon: 0.5, steel: 2 },
    water: { fire: 2, water: 0.5, grass: 0.5, ground: 2, rock: 2, dragon: 0.5 },
    grass: { fire: 0.5, water: 2, grass: 0.5, poison: 0.5, ground: 2, flying: 0.5, bug: 0.5, rock: 2, dragon: 0.5, steel: 0.5 },
    electric: { water: 2, grass: 0.5, electric: 0.5, ground: 0, flying: 2, dragon: 0.5 },
    ice: { fire: 0.5, water: 0.5, grass: 2, ice: 0.5, ground: 2, flying: 2, dragon: 2, steel: 0.5 },
    fighting: { normal: 2, ice: 2, poison: 0.5, flying: 0.5, psychic: 0.5, bug: 0.5, rock: 2, ghost: 0, dark: 2, steel: 2, fairy: 0.5 },
    poison: { grass: 2, poison: 0.5, ground: 0.5, rock: 0.5, ghost: 0.5, steel: 0, fairy: 2 },
    ground: { fire: 2, grass: 0.5, electric: 2, poison: 2, flying: 0, bug: 0.5, rock: 2, steel: 2 },
    flying: { grass: 2, electric: 0.5, fighting: 2, bug: 2, rock: 0.5, steel: 0.5 },
    psychic: { fighting: 2, poison: 2, psychic: 0.5, dark: 0, steel: 0.5 },
    bug: { fire: 0.5, grass: 2, fighting: 0.5, poison: 0.5, flying: 0.5, psychic: 2, ghost: 0.5, dark: 2, steel: 0.5, fairy: 0.5 },
    rock: { fire: 2, ice: 2, fighting: 0.5, ground: 0.5, flying: 2, bug: 2, steel: 0.5 },
    ghost: { normal: 0, psychic: 2, ghost: 2, dark: 0.5 },
    dragon: { dragon: 2, steel: 0.5, fairy: 0 },
    dark: { fighting: 0.5, psychic: 2, ghost: 2, dark: 0.5, fairy: 0.5 },
    steel: { fire: 0.5, water: 0.5, electric: 0.5, ice: 2, rock: 2, steel: 0.5, fairy: 2 },
    fairy: { fire: 0.5, fighting: 2, poison: 0.5, dragon: 2, dark: 2, steel: 0.5 }
};

let sections = { team1: [], team2: [], list: [] };
let activeTarget = 'team1';
let activeTypeFilters = [];
const highlightedTypes = new Set();
const collapsedPanels = { list: false };

// 宣告 DOM 元素
const analysisLayout = document.getElementById('analysis-layout');
const teamResizer = document.getElementById('team-resizer');

function getEffectiveness(targetTypes) {
    const results = {};
    Object.keys(typeMap).forEach(t => results[t] = 1);
    targetTypes.forEach(targetChinese => {
        const targetEng = typeMap[targetChinese];
        Object.keys(chart).forEach(attackerEng => {
            const multiplier = chart[attackerEng][targetEng] !== undefined ? chart[attackerEng][targetEng] : 1;
            const attackerChinese = Object.keys(typeMap).find(key => typeMap[key] === attackerEng);
            results[attackerChinese] *= multiplier;
        });
    });
    return results;
}

function setActiveTarget(target) {
    activeTarget = target;
    document.querySelectorAll('.analysis-panel').forEach(p => p.classList.toggle('active', p.dataset.target === target));
}

function togglePanelCollapse(panelId) {
    collapsedPanels[panelId] = !collapsedPanels[panelId];
    syncCollapsedPanels();
}

function syncCollapsedPanels() {
    Object.entries(collapsedPanels).forEach(([panelId, isCollapsed]) => {
        const panel = document.querySelector(`.analysis-panel.${panelId}`);
        if (panel) panel.classList.toggle('collapsed', isCollapsed);
    });
}

function addMember(pokemon) {
    const member = { ...pokemon };

    if (activeTarget === 'list') {
        sections.list.push(member);
        renderAllSections();
        return;
    }

    if (sections[activeTarget].length < 6) {
        sections[activeTarget].push(member);
        renderAllSections();
        return;
    }

    const otherTeam = activeTarget === 'team1' ? 'team2' : 'team1';
    if (sections[otherTeam].length < 6) {
        sections[otherTeam].push(member);
        renderAllSections();
        return;
    }

    sections.list.push(member);
    renderAllSections();
}

function clearSection(id) {
    sections[id] = [];
    renderAllSections();
}

function toggleTypeFilter(typeName) {
    const idx = activeTypeFilters.indexOf(typeName);
    if (idx !== -1) activeTypeFilters.splice(idx, 1);
    else {
        if (activeTypeFilters.length >= 2) activeTypeFilters.shift();
        activeTypeFilters.push(typeName);
    }
    renderTypeFilters();
    renderPokemonPool();
}

function resetTypeFilters() {
    activeTypeFilters = [];
    renderTypeFilters();
    renderPokemonPool();
}

function toggleTypeHighlight(typeName) {
    if (highlightedTypes.has(typeName)) highlightedTypes.delete(typeName);
    else highlightedTypes.add(typeName);
    syncHighlightedTypes();
    syncCollapsedPanels();
}

function clearHighlightedTypes() {
    highlightedTypes.clear();
    syncHighlightedTypes();
}

function addSequentialToList() {
    const input = document.getElementById('batch-add-count');
    const count = Math.max(1, parseInt(input?.value || '50', 10) || 50);
    const itemsToAdd = pokemonData.slice(0, count).map(p => ({ ...p }));
    sections.list.push(...itemsToAdd);
    renderAllSections();
}

function syncHighlightedTypes() {
    document.querySelectorAll('.type-badge[data-type]').forEach(el => {
        el.classList.toggle('type-highlighted', highlightedTypes.has(el.dataset.type));
    });
}

function renderTypeFilters() {
    const container = document.getElementById('type-filter-container');
    const types = Object.keys(typeMap);
    container.innerHTML = types.map(t => `
        <button class="type-filter-btn type-${typeMap[t]} ${activeTypeFilters.includes(t) ? 'active' : ''}" 
                onclick="toggleTypeFilter('${t}')">${t}</button>
    `).join('');
}

function renderPokemonPool() {
    const container = document.getElementById('pool-container');
    const filtered = pokemonData.filter(p => activeTypeFilters.every(f => p.types.includes(f)));
    container.innerHTML = filtered.map(p => `
        <div class="pool-item" onclick="addMember(${JSON.stringify(p).replace(/"/g, '&quot;')})">
            <img src="https://img.pokemondb.net/sprites/home/normal/${p.image_id}.png">
            <div>${p.name}</div>
        </div>
    `).join('');
}

								 
															
								 
					 
 

								  
							 
					 
 

						   
																	   
																					   
	   
 

function renderAllSections() {
    ['team1', 'team2', 'list'].forEach(id => {
        const container = document.getElementById(id + '-container');
        const data = sections[id];
		
        if (data.length === 0) {
            container.innerHTML = `<div class="panel-empty">${id === 'list' ? '點擊列表區塊後，從下方加入寶可夢到列表' : '點擊區塊後從下方加入寶可夢'}</div>`;
        } else {
            container.innerHTML = data.map((p, index) => {
                const eff = getEffectiveness(p.types);
                const groups = { '4X': [], '2X': [], '0.5X': [], '0.25X': [], '0X': [] };
                for (const t in eff) {
                    if (eff[t] === 4) groups['4X'].push(t);
                    else if (eff[t] === 2) groups['2X'].push(t);
                    else if (eff[t] === 0.5) groups['0.5X'].push(t);
                    else if (eff[t] === 0.25) groups['0.25X'].push(t);
                    else if (eff[t] === 0) groups['0X'].push(t);			
                }
                let effHtml = '<div class="eff-group">';
				for (const label in groups) {
					if (groups[label].length > 0) {
						// 動態生成對應的背景 Class (例如 4X -> bg-4x, 0.5X -> bg-05x)
						const bgClass = "bg-" + label.replace('.', '').toLowerCase();
						
						effHtml += `<div class="eff-box ${bgClass}">
										<span class="eff-label">${label}</span>
										<div class="eff-content">`;
						
						groups[label].forEach(t => {
							effHtml += `<span class="type-badge type-${typeMap[t]}" data-type="${t}" onclick="event.stopPropagation(); toggleTypeHighlight('${t}')">${t}</span>`;
						});
						
						effHtml += '</div></div>';
					}
				}
                effHtml += '</div>';

                return `
                    <div class="selected-row">
                        <img src="https://img.pokemondb.net/sprites/home/normal/${p.image_id}.png">
                        <div>
                            <div class="pokemon-name">${p.name}</div>
                            <div>${p.types.map(t => `<span class="type-badge type-${typeMap[t]}" data-type="${t}" onclick="event.stopPropagation(); toggleTypeHighlight(\'${t}\')">${t}</span>`).join('')}</div>
                        </div>
                        <div>${effHtml}</div>
                        <div class="btn-panel-action btn-danger" style="border:none" onclick="event.stopPropagation(); sections['${id}'].splice(${index},1); renderAllSections()">×</div>
                    </div>
                `;
            }).join('');
        }
        document.getElementById(id + '-meta').textContent = id === 'list' ? `${data.length}` : `${data.length} / 6`;
    });
    syncHighlightedTypes();
}

// 拖曳寬度功能
if (analysisLayout && teamResizer) {
    let isDragging = false;
    teamResizer.addEventListener('mousedown', () => { isDragging = true; document.body.style.cursor = 'col-resize'; });
    window.addEventListener('mousemove', (e) => {
        if (!isDragging) return;
        const rect = analysisLayout.getBoundingClientRect();
        const offset = e.clientX - rect.left;
        const percentage = (offset / rect.width) * 100;
        if (percentage > 20 && percentage < 80) {
            analysisLayout.style.setProperty('--team1-width', `${percentage}fr`);
            analysisLayout.style.setProperty('--team2-width', `${100 - percentage}fr`);
        }
    });
    window.addEventListener('mouseup', () => { isDragging = false; document.body.style.cursor = 'default'; });
}

// 初始化
document.addEventListener('DOMContentLoaded', () => {
    renderTypeFilters();
    renderPokemonPool();
    renderAllSections();
    syncCollapsedPanels();
    setActiveTarget('team1');
});
</script>
